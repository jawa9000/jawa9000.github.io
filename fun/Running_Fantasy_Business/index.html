    <meta charset='utf-8'>

</head>

<body>
    <h1 class="center">Running a Fantasy Business</h1>
    <div class="container">
        <div class="row">
            <div class="col-md-1"></div>
            <div class="col-md-10">
                <div class="form-group">
                    <label for="businessType">Business Type</label>
                    <select id="businessType">
                        <option value="">-- Select a Business --</option>
                        <option value="Inn / Tavern">Inn / Tavern</option>
                        <option value="General Store">General Store</option>
                        <option value="Smithy">Smithy</option>
                        <option value="Shrine / Chapel">Shrine / Chapel</option>
                        <option value="Market Square">Market Square</option>
                        <option value="Stables">Stables</option>
                        <option value="Apothecary">Apothecary</option>
                        <option value="Armorer / Weaponsmith">Armorer / Weaponsmith</option>
                        <option value="Bank / Moneychanger">Bank / Moneychanger</option>
                        <option value="Bowyer / Fletcher">Bowyer / Fletcher</option>
                        <option value="Jeweler / Gemcutter">Jeweler / Gemcutter</option>
                        <option value="Leatherworker">Leatherworker</option>
                        <option value="Scribe / Cartographer">Scribe / Cartographer</option>
                        <option value="Tailor / Clothier">Tailor / Clothier</option>
                        <option value="Arcane Shop / Magic Shop">Arcane Shop / Magic Shop</option>
                        <option value="Alchemist's Laboratory">Alchemist's Laboratory</option>
                        <option value="Wainwright / Wheelwright">Wainwright / Wheelwright</option>
                        <option value="Tattoo Parlor">Tattoo Parlor</option>
                        <option value="University / Great Library">University / Great Library</option>
                        <option value="Auction House">Auction House</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Business Category:</label>
                    <div class="tier-display" id="tierDisplay">-- Select a business --</div>
                </div>

                <div class="form-group">
                    <label for="days">Days</label>
                    <input id="days" type="number" min="1" step="1" max="365" value="7">
                </div>

                <div class="form-group">
                    <label for="dailyCosts">Daily Maintenance Costs (gp)</label>
                    <input id="dailyCosts" type="number" min=".5" step=".1" value="2">
                </div>

                <div class="form-group">
                    <label for="balance">Starting Balance (gp)</label>
                    <input id="balance" type="number" min="1" step="1" value="100">
                </div>

                <div class="form-group">
                    <label for="season">Starting Season</label>
                    <select id="season">
                        <option value="Spring">Spring</option>
                        <option value="Summer">Summer</option>
                        <option value="Fall" selected>Fall</option>
                        <option value="Winter">Winter</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="taxRate">Daily Tax Rate (%)</label>
                    <input id="taxRate" type="number" min="0" max="100" step="0.1" value="10">
                </div>

                <div class="form-group">
                    <label>
                        <input type="checkbox" id="ownerAdventuring"> Owner is Adventuring (No profit, maintenance costs apply)
                    </label>
                </div>

                <button>Run Simulation</button>
                <br/>
                <a href="reference.html" title="Reference information for different types of businesses and construction costs and time." class="rpg_link" target="_blank">Buildings Reference</a>

                <div class="legend">
                    <strong>Legend:</strong> <span class="common">● Common</span> | <span class="uncommon">● Uncommon</span> | <span class="rare">● Rare/Specialized</span>
                </div>
            </div>
            <div class="col-md-1"></div>
        </div>
        <div class="row">
            <div class="col-md-1"></div>
            <div class="col-md-5">
                
                <div id="output"></div>
            </div>
            <div class="col-md-5">
                <canvas id="balanceCanvas" width="550" height="450"></canvas>
            </div>
            <div class="col-md-1"></div>
        </div>
    </div>
</body>

<script src="js/main.js"></script>

</html>
