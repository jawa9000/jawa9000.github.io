        <meta charset='utf-8'>
        <meta http-equiv='X-UA-Compatible' content='IE=edge,chrome=1'>
        <title>Dragon Generator</title>
        <meta name='description' content='Dragon Generator'>
        <meta name='viewport' content='width=device-width, initial-scale=1'>
        <meta name="keywords" content="dragon, javascript, random">
        <meta name="author" content="Brian Immel">
		<meta name="level" content="2">

        <link href="../../css/bootstrap.min.css" rel="stylesheet">
        <link href="main.css" rel="stylesheet">
        <script src="../../js/jquery-3.7.1.min.js"></script>
        <script src="../js/RPG_navigation.js"></script>
        <link href="../Running_Fantasy_Business/css/main.css" rel="stylesheet" />
    </head>
    <body>
        <div class="container">
            <div class="row">
                <div class="col-md-12">
                    <h1 id="name"></h1>
                    <h2 id="ageColor"></h2>
                    <h3 id="nicknames"></h3>
                </div>
            </div>
            <div class="row" style="margin-bottom: 20px;">
                <div class="col-md-12">
                    <form class="form-inline">
                        <div class="form-group" style="margin-right: 10px;">
                            <label for="ageSelect"><strong>Age</strong>:</label>
                            <select id="ageSelect" class="form-control" style="margin-left: 5px;"></select>
                        </div>
                        <div class="form-group" style="margin-right: 10px;">
                            <label for="colorSelect"><strong>Color</strong>:</label>
                            <select id="colorSelect" class="form-control" style="margin-left: 5px;"></select>
                        </div>
                        <button id="generateBtn" type="button" class="btn btn-primary">Generate Dragon</button>
                    </form>
                </div>
            </div>
            <div class="row">
                <div class="col-md-12">
                    <h2>Dragon characteristics</h2>
                </div>
            </div>
            <div class="row">
                <div class="col-md-3">
                    <p id="size"></p>
                    <p id="mannerism"></p>
                    <p id="personality"></p>
                    <p id="appearance"></p>
                </div>
                <div class="col-md-3">
                    <p id="bond"></p>
                    <p id="flawSecret"></p>
                    <p id="goal"></p>
                    <p id="encounterComplication"></p>
                </div>
                <div class="col-md-3">
                    <p id="ideal"></p>
                    <p id="hook"></p>
                    <p id="connection"></p>
                </div>
                <div class="col-md-3">
                    <p id="origninDragonEgg"></p>
                    <p id="deathThroe"></p>
                    <p id="echo"></p>
                    <p id="location"></p>
                </div>
            </div>
            <div class="row">
                <div class="col-md-12">
                    <h2>Hoard characteristics</h2>
                </div>
            </div>
            <div class="row">
                <div class="col-md-4">
                    <p id="hoardLinkingItem"></p>
                    <p id="hoardItemQuark"></p>
                    <p id="unfinishedBusiness"></p>
                </div>
                <div class="col-md-4">
                    <p id="hoardCurseEffect"></p>
                    <p id="breakingHoardCurse"></p>
                </div>
                <div class="col-md-4">
                    <p id="hoardMagic"></p>
                    <p id="coinOrigin"></p>
                </div>
            </div>
            <div class="row">
                <div class="col-md-12">
                    <h2>Treasure</h2>
                </div>
            </div>
            <div class="row">
                <div class="col-md-3">
                    <h3>Coins</h3>
                    <p id="cp"></p>
                    <p id="sp"></p>
                    <p id="gp"></p>
                    <p id="pp"></p>
                    <h3>Gems</h3>
                    <p id="gems"></p>
                </div>
                <div class="col-md-3">
                    <h3>Mundane objects</h3>
                    <p id="mundane"></p>
                </div>
                <div class="col-md-3">
                    <h3>Art objects</h3>
                    <p id="art"></p>
                </div>
                <div class="col-md-3">
                    <h3>Magic items</h3>
                    <p id="magic"></p>
                </div>
            </div>
        </div>
    </body>

    <script src="data.js"></script>
    <script src="../../js/jquery-3.7.1.min.js"></script>
    <script src="script.js"></script>
